conda_environment: "workflow/envs/nextstrain.yaml"

genesforglycosylation: ["G", "F"]

# Keep genome-only for your build
builds_to_run: ["genome"]
resolutions_to_run: ["all-time"]

subtypes: ["a", "b"]

include:
  - "country == 'Norway'"

exclude: "config/outliers.txt"
description: "config/description.md"

strain_id_field: "accession"
display_strain_field: "strain"

inputs:
  - name: data
    metadata: "data/{a_or_b}/metadata.tsv.gz"
    sequences: "data/{a_or_b}/sequences.fasta.xz"

filter:
  group_by: "year country"

  min_coverage:
    genome: 0.3
    G: 0.3
    F: 0.3
    F-antibody-escape: 0.75

  min_length:
    genome: 10000
    G: 600
    F: 1200
    F-antibody-escape: 1200

  resolutions:
    all-time:
      min_date: 1975-01-01
    6y:
      min_date: 6Y
      background_min_date: 12Y
    3y:
      min_date: 3Y
      background_min_date: 12Y

  subsample_max_sequences:
    genome: 3000
    G: 3000
    F: 3000
    F-antibody-escape: 2000

  exclude_where:
    recent: ["qc.overallStatus=bad"]
    background: ["qc.overallStatus=bad", "qc.overallStatus=mediocre"]

  missing_data_threshold: 1000

files:
  color_schemes: "config/colors.tsv"
  auspice_config: "config/auspice_config.json"
  auspice_config_additional_colorings: "config/auspice_config_additional_colorings.json"
  auspice_config_f_antibody_escape: "config/auspice_config_dms-defaults.json"
  auspice_config_non-genome_builds: "config/auspice_config_non-genome.json"

refine:
  coalescent: "opt"
  date_inference: "marginal"
  clock_filter_iqd: 4

ancestral:
  inference: "joint"

cds:
  F: "F"
  G: "G"
  genome: "F"
  F-antibody-escape: "F"

traits:
  columns: "country region"

frequencies:
  resolutions:
    all-time:
      min_date: 1975-01-01
    6y:
      min_date: 6Y
    3y:
      min_date: 3Y

nextclade_attributes:
  a:
    name: "RSV-A NextClade using real-time tree"
    reference_name: "hRSV/A/England/397/2017"
    accession: "EPI_ISL_412866"
  b:
    name: "RSV-B NextClade using real-time tree"
    reference_name: "hRSV/B/Australia/VIC-RCH056/2019"
    accession: "EPI_ISL_1653999"

f_dms_data: "dms-data/all_antibodies.csv"

f_dms_antibodies:
  - "Clesrovimab-Fab"
  - "Clesrovimab-IgG"
  - "Nirsevimab-Fab"
  - "Nirsevimab-IgG"

dms_only_positive_escape: true

enrich_antibody_escape:
  F-antibody-escape:
    nseqs_per_antibody_scoretype: 500
    group_by: [country, year]
    max_identical_f_prot_muts: 2
    max_identical_max_escape_mut: 6
