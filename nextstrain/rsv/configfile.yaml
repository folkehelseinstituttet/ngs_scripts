conda_environment: "workflow/envs/nextstrain.yaml"

genesforglycosylation: ["G", "F"]
builds_to_run: ["genome"]
resolutions_to_run: ["all-time"]

include:
  - "country == 'Norway'"

exclude: "config/outliers.txt"
description: "config/description.md"

strain_id_field: "accession"
display_strain_field: "strain"

inputs:
  - name: data
    metadata: data/{a_or_b}/metadata.tsv.gz
    sequences: data/{a_or_b}/sequences.fasta.xz

subtypes: ['a', 'b']

filter:
  group_by: "year country"

  min_coverage:
    genome: 0.3
    G: 0.3
    F: 0.3

  min_length:
    genome: 10000
    G: 600
    F: 1200

  resolutions:
    all-time:
      min_date: 1975-01-01
    6y:
      min_date: 6Y
      background_min_date: 12Y
    3y:
      min_date: 3Y
      background_min_date: 12Y

  subsample_max_sequences:
    genome: 3000
    G: 3000
    F: 3000

  exclude_where:
    recent:
      - "qc.overallStatus=bad"
    background:
      - "qc.overallStatus=bad"
      - "qc.overallStatus=mediocre"

  missing_data_threshold: 1000

files:
  color_schemes: "config/colors.tsv"
  auspice_config: "config/auspice_config.json"

refine:
  coalescent: "opt"
  date_inference: "marginal"
  clock_filter_iqd: 4

cds:
  F: "F"
  G: "G"
  genome: "F"

ancestral:
  inference: "joint"

traits:
  columns: ["country", "division", "location"]

nextclade_attributes:
  a:
    name: "RSV-A NextClade using real-time tree"
    reference_name: "hRSV/A/England/397/2017"
    accession: "EPI_ISL_412866"
  b:
    name: "RSV-B NextClade using real-time tree"
    reference_name: "hRSV/B/Australia/VIC-RCH056/2019"
    accession: "EPI_ISL_1653999"
